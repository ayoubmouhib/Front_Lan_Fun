name: application
description: "LinguaConnect - Language Exchange Social Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  get: ^4.6.6

  # HTTP client
  dio: ^5.7.0

  # Real-time (WebSocket)
  web_socket_channel: ^3.0.1

  # Audio/Video calls (WebRTC via LiveKit)
  livekit_client: ^2.3.4

  # UI & fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Local storage
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # Animations
  lottie: ^3.1.3

  # Image handling
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # Social auth
  google_sign_in: ^6.2.2

  # Audio recording & playback (vocabulary pronunciation)
  record: ^6.0.0
  audioplayers: ^6.1.0
  path_provider: ^2.1.5

  # Utils
  intl: ^0.19.0
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
